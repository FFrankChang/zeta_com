server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name z-aci.com www.z-aci.com;

    root /var/www/html;
    index zh.html;

    # 根路径跳转到中文版
    location = / {
        return 302 /zh;
    }

    # 中文页面路由
    location /zh {
        try_files $uri $uri.html $uri/index.html /zh.html;
    }

    # 英文页面路由
    location /en {
        try_files $uri $uri.html $uri/index.html /en.html;
    }

    # Next.js 静态资源 — 长期缓存
    location /_next/static {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 媒体与图片资源缓存
    location ~* \.(mp4|svg|ico|png|jpg|jpeg|webp|gif|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # 其他静态文件
    location / {
        try_files $uri $uri/ =404;
    }
}
